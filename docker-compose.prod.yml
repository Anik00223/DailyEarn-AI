# Production Environment Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      target: production
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      CORS_ORIGIN: https://dailyearnai.com
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      DOMAIN: dailyearnai.com
    volumes:
      - ./nginx/conf.production.dailyearnai.com:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets/ssl-production.conf:/etc/nginx/snippets/ssl.conf:ro
      - ./nginx/snippets/letsencrypt-production.conf:/etc/nginx/snippets/letsencrypt.conf:ro

profiles:
  - production
