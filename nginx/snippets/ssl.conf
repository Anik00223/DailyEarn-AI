# SSL Configuration Snippet

# SSL protocols and ciphers
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# SSL session settings
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;

# Security headers
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Diffie-Hellman parameters (generate with: openssl dhparam -out dhparam.pem 4096)
# ssl_dhparam /etc/ssl/certs/dhparam.pem;

# Certificate paths (will be updated by certbot)
ssl_certificate /etc/letsencrypt/live/dailyearnai.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/dailyearnai.com/privkey.pem;
ssl_trusted_certificate /etc/letsencrypt/live/dailyearnai.com/chain.pem;
