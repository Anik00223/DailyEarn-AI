name: CD - Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract short SHA
        id: sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Extract branch name
        id: branch
        run: echo "BRANCH=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:staging-${{ steps.sha.outputs.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          platforms: linux/amd64
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:staging
            ${{ env.FRONTEND_IMAGE }}:staging-${{ steps.sha.outputs.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            VITE_API_URL=https://staging.dailyearnai.com
          platforms: linux/amd64
      
      - name: Create deployment package
        run: |
          tar -czf deploy-staging.tar.gz \
            docker-compose.yml \
            docker-compose.staging.yml \
            nginx/conf.staging.dailyearnai.com \
            nginx/snippets/ssl-staging.conf \
            nginx/snippets/letsencrypt-staging.conf \
            Dockerfile.nginx \
            .env.staging.sample \
            scripts/deploy.sh
      
      - name: Deploy to DigitalOcean VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          REMOTE_HOST: ${{ secrets.DROPLET_IP_STAGING }}
          REMOTE_USER: ${{ secrets.DROPLET_USER }}
          REMOTE_PORT: 22
          SOURCE: deploy-staging.tar.gz
          TARGET: /opt/dailyearn
          EXCLUDE: ".git/, node_modules/, .env.local"
      
      - name: Execute deployment script on server
        uses: appleboy/ssh-action@master
        env:
          BACKEND_IMAGE_TAG: staging
          FRONTEND_IMAGE_TAG: staging
          NODE_ENV: staging
          BUILD_TARGET: production
        with:
          host: ${{ secrets.DROPLET_IP_STAGING }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          port: 22
          script: |
            # Create project directory if not exists
            mkdir -p /opt/dailyearn
            cd /opt/dailyearn
            
            # Extract deployment package
            tar -xzf deploy-staging.tar.gz
            
            # Create environment file from secrets
            cat > .env.staging << EOF
            NODE_ENV=staging
            DOMAIN=staging.dailyearnai.com
            
            # PostgreSQL
            POSTGRES_DB=${{ secrets.POSTGRES_DB_STAGING }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER_STAGING }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_STAGING }}
            POSTGRES_PORT=5432
            
            # Redis
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD_STAGING }}
            REDIS_PORT=6379
            
            # Backend
            BACKEND_PORT=3001
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET_STAGING }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET_STAGING }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_STAGING }}
            BCRYPT_ROUNDS=12
            CORS_ORIGIN=https://staging.dailyearnai.com
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET_STAGING }}
            
            # Frontend
            FRONTEND_PORT=5173
            VITE_API_URL=https://staging.dailyearnai.com
            
            # Nginx
            NGINX_PORT=80
            NGINX_SSL_PORT=443
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            EOF
            
            # Set proper permissions
            chmod 600 .env.staging
            
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml pull
            
            # Rolling deployment
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d backend
            sleep 30
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d frontend
            sleep 30
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d nginx
            
            # Cleanup
            docker image prune -f
            docker system prune -f --volumes
            
            # Wait for services to be healthy
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml ps
      
      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP_STAGING }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          port: 22
          script: |
            # Wait for services
            sleep 10
            
            # Check container status
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml ps
            
            # Health check
            curl -f https://staging.dailyearnai.com/health || exit 1
            curl -f https://staging.dailyearnai.com/api/health || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()
    
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy-staging.result }}
          channel: '#deployments'
          text: |
            DailyEarn AI Staging Deployment
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Status: ${{ needs.deploy-staging.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
