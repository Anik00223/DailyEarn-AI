name: CD - Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # Require manual approval for production
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for approval
        run: echo "Production deployment approved"
  
  deploy-production:
    runs-on: ubuntu-latest
    needs: approve
    environment: production
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract short SHA
        id: sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Extract version from tag or SHA
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ steps.sha.outputs.SHORT_SHA }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          platforms: linux/amd64
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            VITE_API_URL=https://dailyearnai.com
          platforms: linux/amd64
      
      - name: Create deployment package
        run: |
          tar -czf deploy-production.tar.gz \
            docker-compose.yml \
            docker-compose.prod.yml \
            nginx/conf.production.dailyearnai.com \
            nginx/snippets/ssl-production.conf \
            nginx/snippets/letsencrypt-production.conf \
            Dockerfile.nginx \
            .env.prod.sample \
            scripts/deploy.sh \
            scripts/backup.sh
      
      - name: Deploy to DigitalOcean VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          REMOTE_HOST: ${{ secrets.DROPLET_IP_PROD }}
          REMOTE_USER: ${{ secrets.DROPLET_USER }}
          REMOTE_PORT: 22
          SOURCE: deploy-production.tar.gz
          TARGET: /opt/dailyearn
          EXCLUDE: ".git/, node_modules/, .env.local"
      
      - name: Execute deployment script with backup
        uses: appleboy/ssh-action@master
        env:
          BACKEND_IMAGE_TAG: latest
          FRONTEND_IMAGE_TAG: latest
          NODE_ENV: production
          BUILD_TARGET: production
        with:
          host: ${{ secrets.DROPLET_IP_PROD }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          port: 22
          script: |
            # Create project directory
            mkdir -p /opt/dailyearn
            cd /opt/dailyearn
            
            # Extract deployment package
            tar -xzf deploy-production.tar.gz
            
            # Create backup before deployment
            ./scripts/backup.sh production
            
            # Create environment file
            cat > .env.production << EOF
            NODE_ENV=production
            DOMAIN=dailyearnai.com
            
            # PostgreSQL
            POSTGRES_DB=${{ secrets.POSTGRES_DB_PROD }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER_PROD }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_PROD }}
            POSTGRES_PORT=5432
            
            # Redis
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD_PROD }}
            REDIS_PORT=6379
            
            # Backend
            BACKEND_PORT=3001
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET_PROD }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET_PROD }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_PROD }}
            BCRYPT_ROUNDS=12
            CORS_ORIGIN=https://dailyearnai.com
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET_PROD }}
            
            # Frontend
            FRONTEND_PORT=5173
            VITE_API_URL=https://dailyearnai.com
            
            # Nginx
            NGINX_PORT=80
            NGINX_SSL_PORT=443
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            
            # Sentry
            SENTRY_DSN=${{ secrets.SENTRY_DSN_PROD }}
            SENTRY_ENVIRONMENT=production
            EOF
            
            chmod 600 .env.production
            
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull images
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
            
            # Rolling deployment with health checks
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d backend
            
            # Wait for backend to be healthy
            for i in {1..30}; do
              if curl -f http://localhost:3001/health; then
                echo "Backend is healthy"
                break
              fi
              echo "Waiting for backend... $i/30"
              sleep 2
            done
            
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d frontend
            sleep 10
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d nginx
            
            # Cleanup
            docker image prune -f
            docker system prune -f --volumes
            
            # Verify deployment
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps
      
      - name: Run smoke tests
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP_PROD }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          port: 22
          script: |
            # Wait for deployment
            sleep 10
            
            # Health checks
            curl -f https://dailyearnai.com/health
            curl -f https://dailyearnai.com/api/health
            
            # Smoke test API
            curl -f https://dailyearnai.com/api/auth/login -X POST \
              -H "Content-Type: application/json" \
              -d '{"email":"test@test.com","password":"test123"}' || echo "Login endpoint tested"
            
            echo "Production deployment successful!"

  notify:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy-production.result }}
          channel: '#deployments'
          text: |
            DailyEarn AI Production Deployment
            Version: ${{ needs.deploy-production.outputs.version }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Status: ${{ needs.deploy-production.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
