# Development Override Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  # Development overrides for backend
  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
    ports:
      - "9229:9229" # Debugger port
    command: npm run dev:debug

  # Development overrides for frontend
  frontend:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - /app/node_modules
    ports:
      - "24678:24678" # Vite HMR port

  # Development doesn't need nginx
  nginx:
    profiles:
      - disabled

  # Development doesn't need certbot
  certbot:
    profiles:
      - disabled
