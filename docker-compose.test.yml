# Testing Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  postgres:
    environment:
      POSTGRES_DB: dailyearn_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password

  redis:
    command: redis-server --appendonly no

  backend:
    build:
      target: build
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://test_user:test_password@postgres:5432/dailyearn_test
      REDIS_URL: redis://redis:6379
    command: npm run test

networks:
  dailyearn-network:
    driver: bridge
